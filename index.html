<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      Тестовый сайт с кнопками, CSS Grid
    </title>
  </head>
  <body style="
    background: #111111;
    color: #FFFFFF;
    font-family: system-ui;
    padding: 20px;
    ">
    <div style="
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      grid-gap: 10px;
    ">
      <div style="
        border: 1px solid white;
        border-radius: 16px;
      ">
        <h1>
          Привет!
        </h1>
        <p>
          Эта страничка для теста.
        </p>
      </div>
      <div style="
        border: 1px solid white;
        border-radius: 16px;
      ">
        <h1>
          Нажми на кнопку
        </h1>
        <p>
          Чтобы протестировать наш проект.
        </p>
        <a href="https://fuulban.github.io/test/subpages/page-1.html" style="
          background: #FFFFFF;
          color: #111111;
          padding: 10px;
          border-radius: 16px;
        ">
          Кнопка
        </a>
      </div>
    </div>
  </body>
